---
  name: Deploy Frontend
  
  on:
    push:
      branches:
        - main
    pull_request:
      branches:
      - '**'

  jobs:
    deploy:
      runs-on: ubuntu-latest
  
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
  
        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
  
        - name: Install Dependencies
          run: npm ci
          
        - name: Check npm version
          run: npm --version
  
        - name: Build Site
          run: npm run build
          env:
            CI: false
  